name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia: ["1"]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}

      - uses: julia-actions/cache@v2

      - name: Instantiate test environment
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(url="https://github.com/PenguinxCutCell/Vofinit.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/VOFTools.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/VofiJul.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/CartesianGeometry.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/CartesianOperators.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/CartesianGrids.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/PenguinBCs.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/PenguinSolverCore.jl.git"),
              PackageSpec(url="https://github.com/PenguinxCutCell/PenguinDiffusion.jl.git"),
              PackageSpec(path=pwd())
            ])
            Pkg.instantiate()'

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
